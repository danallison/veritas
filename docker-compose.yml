services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      VERITAS_PORT: "8080"
      VERITAS_DB: "host=db port=5432 dbname=veritas user=veritas password=veritas"
    ports:
      - "8080:8080"

  # Production container: multi-stage build, small image
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    profiles: [prod]
    depends_on:
      db:
        condition: service_healthy
    environment:
      VERITAS_PORT: "8080"
      VERITAS_DB: "host=db port=5432 dbname=veritas user=veritas password=veritas"
    ports:
      - "8080:8080"

  # Web UI (React + Vite dev server)
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3002:3002"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    environment:
      PROXY_TARGET: "http://app:8080"

  # Dev container for building/testing without running the server
  dev:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      VERITAS_DB: "host=db port=5432 dbname=veritas user=veritas password=veritas"
    entrypoint: ["sleep", "infinity"]
    volumes:
      - .:/app
      - cabal-store:/root/.local/state/cabal/store
      - cabal-cache:/root/.cache/cabal

volumes:
  pgdata:
  cabal-store:
  cabal-cache:
  web-node-modules:
